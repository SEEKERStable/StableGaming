<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pike Subway Surfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #2c3e50;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
        }
        .ui-element {
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- Overlay de UI -->
    <div id="ui" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start ui-element">
        <div class="bg-black/40 backdrop-blur-md p-3 rounded-xl border border-white/20">
            <p class="text-white text-xs uppercase font-bold opacity-70">Pontuação</p>
            <p id="score" class="text-white text-2xl font-black">0</p>
        </div>
        <div class="bg-black/40 backdrop-blur-md p-3 rounded-xl border border-white/20 text-right">
            <p class="text-white text-xs uppercase font-bold opacity-70">Recorde</p>
            <p id="high-score" class="text-white text-2xl font-black">0</p>
        </div>
    </div>

    <!-- Tela Inicial -->
    <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm z-50">
        <h1 class="text-6xl font-black text-yellow-400 mb-2 italic drop-shadow-lg">PIKE SURF</h1>
        <p class="text-white mb-8 font-medium animate-pulse">DESLIZE PARA OS LADOS E CIMA</p>
        <button id="start-btn" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 px-12 rounded-full text-2xl shadow-[0_8px_0_rgb(161,98,7)] transition-all active:translate-y-1 active:shadow-none">
            JOGAR
        </button>
    </div>

    <!-- Tela de Game Over -->
    <div id="death-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-red-900/80 backdrop-blur-md z-50 hidden">
        <h2 class="text-5xl font-black text-white mb-2">BATEU!</h2>
        <p id="final-score" class="text-white text-2xl mb-8">Score: 0</p>
        <button id="restart-btn" class="bg-white text-red-600 font-black py-4 px-12 rounded-full text-2xl shadow-xl active:scale-95 transition-transform">
            TENTAR DE NOVO
        </button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const startScreen = document.getElementById('start-screen');
    const deathScreen = document.getElementById('death-screen');
    const finalScoreEl = document.getElementById('final-score');

    // Configurações
    let gameSpeed = 0.015;
    const MAX_SPEED = 0.04;
    const LANE_WIDTH = 1.2;
    const HORIZON_Y = 0.4; // 40% do ecrã de cima para baixo
    
    let state = {
        running: false,
        score: 0,
        highScore: localStorage.getItem('pikeSurf_highScore') || 0,
        player: {
            lane: 0, // -1, 0, 1
            targetLane: 0,
            y: 0,
            jumpY: 0,
            jumpVel: 0,
            isJumping: false
        },
        objects: [],
        particles: [],
        frameCount: 0
    };

    highScoreEl.innerText = state.highScore;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    // Controles Touch (Swipe)
    let touchStart = { x: 0, y: 0 };
    window.addEventListener('touchstart', e => {
        touchStart.x = e.touches[0].clientX;
        touchStart.y = e.touches[0].clientY;
    });

    window.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStart.x;
        const dy = e.changedTouches[0].clientY - touchStart.y;

        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 30 && state.player.targetLane < 1) state.player.targetLane++;
            if (dx < -30 && state.player.targetLane > -1) state.player.targetLane--;
        } else {
            if (dy < -30 && !state.player.isJumping) jump();
        }
    });

    // Controles Teclado
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft' && state.player.targetLane > -1) state.player.targetLane--;
        if (e.key === 'ArrowRight' && state.player.targetLane < 1) state.player.targetLane++;
        if ((e.key === 'ArrowUp' || e.key === ' ') && !state.player.isJumping) jump();
    });

    function jump() {
        state.player.isJumping = true;
        state.player.jumpVel = 0.12;
    }

    function spawnObject() {
        const type = Math.random() > 0.4 ? 'obstacle' : 'coin';
        const lane = Math.floor(Math.random() * 3) - 1;
        state.objects.push({
            type,
            lane,
            z: 2.0, // Começa longe
            id: Date.now()
        });
    }

    function initGame() {
        state.running = true;
        state.score = 0;
        state.objects = [];
        state.player.lane = 0;
        state.player.targetLane = 0;
        state.player.jumpY = 0;
        state.player.isJumping = false;
        gameSpeed = 0.015;
        startScreen.classList.add('hidden');
        deathScreen.classList.add('hidden');
        scoreEl.innerText = "0";
    }

    function gameOver() {
        state.running = false;
        if (state.score > state.highScore) {
            state.highScore = state.score;
            localStorage.setItem('pikeSurf_highScore', state.highScore);
            highScoreEl.innerText = state.highScore;
        }
        finalScoreEl.innerText = `Score: ${state.score}`;
        deathScreen.classList.remove('hidden');
    }

    // Desenha o cenário (Trilhos e Céu)
    function drawEnvironment() {
        const w = canvas.width;
        const h = canvas.height;
        const hy = h * HORIZON_Y;

        // Estrada/Trilho (Cinza)
        ctx.fillStyle = '#34495e';
        ctx.beginPath();
        ctx.moveTo(w * 0.4, hy);
        ctx.lineTo(w * 0.6, hy);
        ctx.lineTo(w * 1.5, h);
        ctx.lineTo(-w * 0.5, h);
        ctx.fill();

        // Linhas dos trilhos
        ctx.strokeStyle = '#5d6d7e';
        ctx.lineWidth = 2;
        for (let i = -1.5; i <= 1.5; i += 1) {
            ctx.beginPath();
            ctx.moveTo(w/2 + (i * w * 0.05), hy);
            ctx.lineTo(w/2 + (i * w * 1.2), h);
            ctx.stroke();
        }
    }

    function project(lane, z) {
        // z vai de 2.0 (longe) a 0.0 (perto/câmera)
        const scale = 1 / z;
        const x = canvas.width / 2 + (lane * LANE_WIDTH * canvas.width * 0.1 * scale);
        const y = canvas.height * HORIZON_Y + (canvas.height * 0.6 * (1 - z/2));
        return { x, y, scale };
    }

    function update() {
        if (!state.running) return;

        state.frameCount++;
        if (state.frameCount % Math.floor(60 / (gameSpeed * 100)) === 0) {
            spawnObject();
        }

        // Suavizar movimento lateral
        state.player.lane += (state.player.targetLane - state.player.lane) * 0.15;

        // Física do salto
        if (state.player.isJumping) {
            state.player.jumpY += state.player.jumpVel;
            state.player.jumpVel -= 0.006;
            if (state.player.jumpY <= 0) {
                state.player.jumpY = 0;
                state.player.isJumping = false;
            }
        }

        // Aumentar velocidade
        if (gameSpeed < MAX_SPEED) gameSpeed += 0.000005;

        // Atualizar objetos
        for (let i = state.objects.length - 1; i >= 0; i--) {
            const obj = state.objects[i];
            obj.z -= gameSpeed;

            // Verificação de Colisão (quando z está perto de 0.2 - 0.4)
            if (obj.z < 0.4 && obj.z > 0.2) {
                const laneDiff = Math.abs(obj.lane - state.player.lane);
                if (laneDiff < 0.4) {
                    if (obj.type === 'obstacle' && state.player.jumpY < 0.3) {
                        gameOver();
                    } else if (obj.type === 'coin') {
                        state.score += 10;
                        scoreEl.innerText = state.score;
                        state.objects.splice(i, 1);
                        continue;
                    }
                }
            }

            if (obj.z < 0) state.objects.splice(i, 1);
        }
    }

    function draw() {
        render();
        update();
        requestAnimationFrame(draw);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawEnvironment();

        // Ordenar objetos por Z (desenhar os de trás primeiro)
        const sortedObjects = [...state.objects].sort((a, b) => b.z - a.z);

        sortedObjects.forEach(obj => {
            const p = project(obj.lane, obj.z);
            const size = 50 * p.scale;

            if (obj.type === 'obstacle') {
                // Desenha um vagão ou barreira
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(p.x - size, p.y - size * 2, size * 2, size * 2);
                ctx.strokeStyle = 'black';
                ctx.strokeRect(p.x - size, p.y - size * 2, size * 2, size * 2);
                // Detalhes
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(p.x - size + 5, p.y - size * 1.8, size * 2 - 10, size * 0.5);
            } else {
                // Moeda
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(p.x, p.y - size, size * 0.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#d4ac0d';
                ctx.stroke();
            }
        });

        // Desenhar Jogador
        const playerZ = 0.35; // Posição fixa da câmera
        const pp = project(state.player.lane, playerZ);
        const pSize = 60 * pp.scale;
        const jumpOffset = state.player.jumpY * canvas.height * 0.5;

        ctx.save();
        ctx.translate(pp.x, pp.y - jumpOffset);

        // Personagem Simples (Pike)
        ctx.fillStyle = '#3498db'; // Azul
        ctx.fillRect(-pSize/2, -pSize, pSize, pSize);
        // Cabeça
        ctx.fillStyle = '#f39c12';
        ctx.beginPath();
        ctx.arc(0, -pSize - pSize/4, pSize/3, 0, Math.PI*2);
        ctx.fill();
        // Hoverboard (Opcional visual)
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(-pSize * 0.7, -5, pSize * 1.4, 10);

        ctx.restore();
    }

    document.getElementById('start-btn').onclick = initGame;
    document.getElementById('restart-btn').onclick = initGame;

    draw();

</script>
</body>
</html>
