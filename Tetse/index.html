<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sobrevivente do Código - Remastered</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Press Start 2P', cursive;
            color: white;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            text-shadow: 3px 3px 0 #000;
            font-size: 14px;
            z-index: 5;
        }

        .xp-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 16px;
            background: #222;
            border-bottom: 2px solid #000;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00bfff, #00ffff);
            width: 0%;
            box-shadow: 0 0 10px #00bfff;
            transition: width 0.2s;
        }

        /* Telas (Menu, Game Over, Level Up) */
        #start-screen, #game-over-screen, #level-up-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10;
        }

        h1 { 
            font-size: 28px; 
            color: #ff4444; 
            text-shadow: 4px 4px 0 #000, 0 0 20px rgba(255, 0, 0, 0.5); 
            margin-bottom: 30px; 
            text-align: center; 
            line-height: 1.5;
        }

        p { font-size: 12px; color: #ccc; text-align: center; max-width: 80%; line-height: 1.8; text-shadow: 2px 2px 0 #000; }
        
        button {
            background: linear-gradient(to bottom, #ff4444, #cc0000);
            border: 4px solid #fff;
            box-shadow: 0 6px 0 #990000, 0 10px 10px rgba(0,0,0,0.5);
            color: white;
            padding: 20px 40px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            margin-top: 30px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s;
        }
        
        button:active { 
            transform: translateY(4px); 
            box-shadow: 0 2px 0 #990000, 0 5px 5px rgba(0,0,0,0.5);
        }

        /* Level Up Cards */
        #upgrade-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 450px;
        }

        .upgrade-card {
            background: linear-gradient(135deg, #222, #333);
            border: 2px solid #fff;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .upgrade-card:hover { 
            background: linear-gradient(135deg, #333, #444); 
            transform: scale(1.02);
            border-color: #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
        }
        
        .upgrade-title { color: #ffcc00; font-size: 14px; margin-bottom: 8px; text-shadow: 2px 2px 0 #000; }
        .upgrade-desc { color: #ddd; font-size: 10px; line-height: 1.4; }
        .upgrade-type { font-size: 10px; float: right; color: #00bfff; font-weight: bold; }

        .hidden { display: none !important; }

        #debug-fps {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 10px;
            color: rgba(255, 255, 0, 0.5);
        }
    </style>
</head>
<body>

    <!-- Canvas do Jogo -->
    <canvas id="gameCanvas"></canvas>

    <!-- Interface (HUD) -->
    <div id="ui-layer">
        <div class="xp-bar-container"><div class="xp-bar-fill" id="xp-bar"></div></div>
        <div class="hud-top">
            <div id="timer">00:00</div>
            <div id="kill-count">💀 0</div>
            <div id="level-display">LVL 1</div>
        </div>
        <div id="debug-fps">FPS: 60</div>
    </div>

    <!-- Tela Inicial -->
    <div id="start-screen">
        <h1>SOBREVIVENTE<br>DO CÓDIGO</h1>
        <p>Arraste para mover o Mago.<br>Sobreviva às hordas.<br>Derrote os 4 Lordes.</p>
        <button onclick="startGame()">INICIAR JORNADA</button>
    </div>

    <!-- Tela de Level Up -->
    <div id="level-up-screen" class="hidden">
        <h1 style="color: #ffcc00;">NOVO PODER!</h1>
        <div id="upgrade-container">
            <!-- Cards gerados via JS -->
        </div>
    </div>

    <!-- Tela de Game Over -->
    <div id="game-over-screen" class="hidden">
        <h1 id="go-title">VOCÊ CAIU</h1>
        <p id="go-stats">Tempo: 00:00</p>
        <button onclick="location.reload()">TENTAR NOVAMENTE</button>
    </div>

    <script>
        // --- CONFIGURAÇÃO E VARIÁVEIS GLOBAIS ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        let width, height;
        let animationId;
        let lastTime = 0;
        let gameTime = 0;
        let isPaused = false;
        let isGameOver = false;

        // Entidades
        const player = {
            x: 0, y: 0, 
            radius: 16, // Hitbox
            visualSize: 32,
            hp: 100, 
            maxHp: 100, 
            speed: 3, 
            baseSpeed: 3,
            xp: 0, 
            nextLevelXp: 10, 
            level: 1,
            pickupRange: 80,
            iFrames: 0,
            facingRight: true,
            sprite: '🧙‍♂️'
        };

        const enemies = [];
        const particles = [];
        const gems = [];
        const projectiles = [];
        const damageNumbers = [];
        const backgroundStars = [];
        
        let kills = 0;
        let enemyPoolTimer = 0;
        let globalDifficulty = 1;

        // Joystick Virtual
        let touchStart = { x: 0, y: 0 };
        let touchCurrent = { x: 0, y: 0 };
        let isTouching = false;
        let joystickVector = { x: 0, y: 0 };

        // --- SISTEMA DE HABILIDADES ---
        const SKILL_TYPES = { WEAPON: 'ARMA', PASSIVE: 'PASSIVA' };

        const skills = {
            // ARMAS
            magicWand: { name: "Varinha Arcana", icon: "✨", type: SKILL_TYPES.WEAPON, level: 0, maxLevel: 5, desc: "Dispara mísseis mágicos no inimigo mais próximo.", cooldown: 60, timer: 0 },
            axe: { name: "Machado", icon: "🪓", type: SKILL_TYPES.WEAPON, level: 0, maxLevel: 5, desc: "Arremessa machados em arco para cima.", cooldown: 80, timer: 0 },
            knife: { name: "Adaga", icon: "🗡️", type: SKILL_TYPES.WEAPON, level: 0, maxLevel: 5, desc: "Dispara facas na direção do movimento.", cooldown: 40, timer: 0 },
            garlic: { name: "Aura Sagrada", icon: "🛡️", type: SKILL_TYPES.WEAPON, level: 0, maxLevel: 5, desc: "Danifica inimigos que encostam em você.", cooldown: 20, timer: 0, active: false },
            bible: { name: "Livro Rúnico", icon: "📖", type: SKILL_TYPES.WEAPON, level: 0, maxLevel: 5, desc: "Livros orbitam ao seu redor.", cooldown: 180, duration: 120, timer: 0 },
            cross: { name: "Cruz", icon: "✝️", type: SKILL_TYPES.WEAPON, level: 0, maxLevel: 5, desc: "Bumerangue sagrado que retorna.", cooldown: 90, timer: 0 },
            fireball: { name: "Bola de Fogo", icon: "🔥", type: SKILL_TYPES.WEAPON, level: 0, maxLevel: 5, desc: "Projétil lento de alto dano.", cooldown: 120, timer: 0 },
            holyWater: { name: "Água Benta", icon: "💧", type: SKILL_TYPES.WEAPON, level: 0, maxLevel: 5, desc: "Cria zonas de fogo sagrado no chão.", cooldown: 140, timer: 0 },

            // PASSIVAS
            spinach: { name: "Espinafre", icon: "🌿", type: SKILL_TYPES.PASSIVE, level: 0, maxLevel: 5, desc: "+10% de Dano.", apply: () => stats.damageMult += 0.1 },
            armor: { name: "Armadura", icon: "🦺", type: SKILL_TYPES.PASSIVE, level: 0, maxLevel: 5, desc: "-1 Dano recebido.", apply: () => stats.armor += 1 },
            hollowHeart: { name: "Coração Negro", icon: "🖤", type: SKILL_TYPES.PASSIVE, level: 0, maxLevel: 5, desc: "+20% Max HP.", apply: () => { player.maxHp *= 1.2; player.hp += 20; } },
            pummarola: { name: "Coração Vermelho", icon: "❤️", type: SKILL_TYPES.PASSIVE, level: 0, maxLevel: 5, desc: "+0.5 HP Regen/seg.", apply: () => stats.regen += 0.5 },
            emptyTome: { name: "Grimório", icon: "📔", type: SKILL_TYPES.PASSIVE, level: 0, maxLevel: 5, desc: "-8% Cooldown.", apply: () => stats.cooldownMult *= 0.92 },
            candelabrador: { name: "Candelabro", icon: "🕯️", type: SKILL_TYPES.PASSIVE, level: 0, maxLevel: 5, desc: "+10% Área de ataque.", apply: () => stats.areaMult += 0.1 },
            wings: { name: "Asas", icon: "🪽", type: SKILL_TYPES.PASSIVE, level: 0, maxLevel: 5, desc: "+10% Velocidade.", apply: () => { player.baseSpeed *= 1.1; player.speed = player.baseSpeed; } },
            attractorb: { name: "Ímã", icon: "🧲", type: SKILL_TYPES.PASSIVE, level: 0, maxLevel: 5, desc: "+25% Alcance de coleta.", apply: () => player.pickupRange *= 1.25 },
            crown: { name: "Coroa", icon: "👑", type: SKILL_TYPES.PASSIVE, level: 0, maxLevel: 5, desc: "+10% XP ganho.", apply: () => stats.xpMult += 0.1 },
            duplicator: { name: "Anel", icon: "💍", type: SKILL_TYPES.PASSIVE, level: 0, maxLevel: 2, desc: "+1 Projétil extra.", apply: () => stats.amount += 1 }
        };

        const stats = {
            damageMult: 1, areaMult: 1, cooldownMult: 1, speedMult: 1,
            amount: 0, armor: 0, regen: 0, xpMult: 1, critChance: 0.05
        };

        // --- INICIALIZAÇÃO ---
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (gameTime === 0) { player.x = width / 2; player.y = height / 2; }
            initBackground();
        }
        window.addEventListener('resize', resize);

        function initBackground() {
            backgroundStars.length = 0;
            // Cria um "chão" interessante com pedras/estrelas estáticas
            for(let i=0; i<100; i++) {
                backgroundStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2,
                    color: Math.random() > 0.8 ? '#444' : '#222'
                });
            }
        }

        function startGame() {
            resize();
            document.getElementById('start-screen').classList.add('hidden');
            gainSkill('magicWand');
            gameTime = 0;
            lastTime = performance.now();
            updateHUD();
            requestAnimationFrame(gameLoop);
        }

        // --- INPUTS ---
        window.addEventListener('touchstart', e => {
            isPaused = false; isTouching = true;
            touchStart.x = e.touches[0].clientX; touchStart.y = e.touches[0].clientY;
            touchCurrent = { ...touchStart };
        }, {passive: false});

        window.addEventListener('touchmove', e => {
            e.preventDefault(); if (!isTouching) return;
            touchCurrent.x = e.touches[0].clientX; touchCurrent.y = e.touches[0].clientY;
            const dx = touchCurrent.x - touchStart.x;
            const dy = touchCurrent.y - touchStart.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const max = 50;
            if (dist > 0) {
                joystickVector.x = (dx/dist) * Math.min(dist/max, 1);
                joystickVector.y = (dy/dist) * Math.min(dist/max, 1);
            }
        }, {passive: false});

        window.addEventListener('touchend', () => { isTouching = false; joystickVector = {x:0, y:0}; });
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        // --- GAME LOOP ---
        function gameLoop(timestamp) {
            if (isPaused || isGameOver) {
                if (!isGameOver) requestAnimationFrame(gameLoop);
                return;
            }

            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            gameTime += dt;

            updatePlayer();
            updateWeapons(dt);
            updateEnemies(dt);
            updateProjectiles();
            updateGems();
            updateParticles();
            checkCollisions();
            spawnSystem(gameTime);
            regenerateHealth(dt);

            render();

            document.getElementById('timer').innerText = formatTime(gameTime);
            document.getElementById('debug-fps').innerText = 'FPS: ' + Math.round(1/dt);
            if (!isGameOver) animationId = requestAnimationFrame(gameLoop);
        }

        // --- RENDERIZAÇÃO (GRÁFICOS) ---
        function render() {
            // Fundo
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, width, height);
            
            // Grid de chão estilizado (move com o player)
            drawFloorGrid();

            drawGems();
            // Sombras antes das entidades
            drawShadows(); 
            drawEnemies();
            drawPlayer();
            drawProjectiles();
            drawParticles();
            drawDamageNumbers();
            
            // Vignette (Escurecer bordas para foco)
            const grad = ctx.createRadialGradient(width/2, height/2, height/2, width/2, height/2, height);
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,width,height);

            if (isTouching) drawJoystick();
        }

        function drawFloorGrid() {
            const size = 64;
            const ox = Math.floor(player.x / size) * size - player.x;
            const oy = Math.floor(player.y / size) * size - player.y;
            
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            // Grid Lines
            for(let x=ox; x<width; x+=size) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for(let y=oy; y<height; y+=size) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();

            // Detalhes no chão
            ctx.fillStyle = '#1a1a1a';
            for(let i=0; i<backgroundStars.length; i++) {
                const s = backgroundStars[i];
                // Parallax simples ou estático relativo ao mundo? Vamos fazer relativo ao mundo
                // Recalcular pos na tela baseada no player seria caro, vamos usar noise estático na tela
                // para performance no mobile, o grid se move, o noise fica "fixo" como sujeira na lente
                ctx.fillStyle = s.color;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }
        }

        function drawShadows() {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            // Sombra Player
            ctx.beginPath();
            ctx.ellipse(player.x, player.y + 12, 10, 4, 0, 0, Math.PI*2);
            ctx.fill();
            // Sombras Inimigos
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + e.radius, e.radius*0.8, e.radius*0.3, 0, 0, Math.PI*2);
                ctx.fill();
            });
        }

        function drawPlayer() {
            // Hit effect
            if (player.iFrames > 0 && Math.floor(Date.now()/50)%2==0) {
                ctx.globalCompositeOperation = 'lighter';
                ctx.filter = 'brightness(200%) sepia(100%) hue-rotate(-50deg) saturate(600%)';
            }

            // Sprite do Player (Emoji)
            ctx.font = `${player.visualSize}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.save();
            ctx.translate(player.x, player.y);
            if (!player.facingRight) ctx.scale(-1, 1);
            
            // Glow leve
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0, 191, 255, 0.5)';
            
            ctx.fillText(player.sprite, 0, 0);
            ctx.restore();

            // Reset filters
            ctx.filter = 'none';
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;

            // HP Bar (Minimalista)
            const hpPct = player.hp / player.maxHp;
            const barW = 30;
            ctx.fillStyle = '#333';
            ctx.fillRect(player.x - barW/2, player.y + 20, barW, 4);
            ctx.fillStyle = hpPct > 0.5 ? '#00ff00' : (hpPct > 0.2 ? '#ffff00' : '#ff0000');
            ctx.fillRect(player.x - barW/2, player.y + 20, barW * hpPct, 4);
        }

        function drawEnemies() {
            enemies.forEach(e => {
                ctx.font = `${e.radius * 2}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.save();
                ctx.translate(e.x, e.y);
                // Inverter se estiver à esquerda do player
                if (e.x < player.x) ctx.scale(-1, 1);

                if (e.isBoss || e.isElite) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = e.color;
                }

                ctx.fillText(e.sprite, 0, 0);
                ctx.restore();
                ctx.shadowBlur = 0;
            });
        }

        function drawGems() {
            gems.forEach(g => {
                // Brilho pulsante
                const pulse = 1 + Math.sin(gameTime * 5) * 0.2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = g.color;
                
                ctx.font = `${12 * pulse}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💎', g.x, g.y);
                ctx.shadowBlur = 0;
            });
        }

        function drawProjectiles() {
            projectiles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                
                if (p.isArea) {
                    // Áreas de efeito (Garlic/Holy Water)
                    ctx.globalAlpha = 0.3 + Math.sin(gameTime * 10) * 0.1;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, p.radius, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.globalAlpha = 1;
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    // Projéteis físicos
                    if (p.rotation) ctx.rotate(p.rotation);
                    else ctx.rotate(Math.atan2(p.vy, p.vx) + Math.PI/2); // Rotaciona na direção do movimento

                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.color;
                    
                    ctx.font = `${p.radius * 3}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    let sprite = '•';
                    if (p.type === 'axe') sprite = '🪓';
                    if (p.type === 'knife') sprite = '🗡️';
                    if (p.type === 'cross') sprite = '✝️';
                    if (p.type === 'missile') sprite = '✨';
                    if (p.type === 'fireball') sprite = '🔥';

                    ctx.fillText(sprite, 0, 0);
                }
                ctx.restore();
                ctx.shadowBlur = 0;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 5;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        function drawDamageNumbers() {
            ctx.textAlign = 'center';
            damageNumbers.forEach(d => {
                const scale = d.life / 30;
                ctx.font = `bold ${12 * d.scale}px Arial`;
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'black';
                ctx.strokeText(d.text, d.x, d.y);
                
                ctx.fillStyle = d.color;
                ctx.fillText(d.text, d.x, d.y);
            });
        }

        function drawJoystick() {
            ctx.beginPath();
            ctx.arc(touchStart.x, touchStart.y, 40, 0, Math.PI * 2);
            ctx.lineWidth = 4;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(touchCurrent.x, touchCurrent.y, 20, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();
            
            // Linha conectando
            ctx.beginPath();
            ctx.moveTo(touchStart.x, touchStart.y);
            ctx.lineTo(touchCurrent.x, touchCurrent.y);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // --- LÓGICA DE JOGO (Mesma estrutura, ajustada para visuais) ---
        function updatePlayer() {
            let dx = 0, dy = 0;
            if (isTouching) { dx = joystickVector.x; dy = joystickVector.y; } 
            else {
                if (keys['ArrowUp'] || keys['w']) dy = -1;
                if (keys['ArrowDown'] || keys['s']) dy = 1;
                if (keys['ArrowLeft'] || keys['a']) dx = -1;
                if (keys['ArrowRight'] || keys['d']) dx = 1;
                if (dx||dy) { const len = Math.sqrt(dx*dx+dy*dy); dx/=len; dy/=len; }
            }
            if (dx !== 0) player.facingRight = dx > 0;
            player.x = Math.max(player.radius, Math.min(width - player.radius, player.x + dx * player.speed));
            player.y = Math.max(player.radius, Math.min(height - player.radius, player.y + dy * player.speed));
            if (player.iFrames > 0) player.iFrames--;
        }

        function regenerateHealth(dt) {
            if (player.hp < player.maxHp && stats.regen > 0) player.hp = Math.min(player.maxHp, player.hp + stats.regen * dt);
        }

        class Enemy {
            constructor(type, x, y) {
                this.x = x; this.y = y; this.type = type;
                this.pushX = 0; this.pushY = 0;
                
                if (type === 'bat') {
                    this.hp = 10 * globalDifficulty; this.speed = 1.5; this.damage = 5; this.xp = 1;
                    this.radius = 12; this.sprite = '🦇'; this.color = '#a0a';
                } else if (type === 'skeleton') {
                    this.hp = 25 * globalDifficulty; this.speed = 0.8; this.damage = 8; this.xp = 2;
                    this.radius = 14; this.sprite = '💀'; this.color = '#ccc';
                } else if (type === 'elite') {
                    this.hp = 100 * globalDifficulty; this.speed = 1.8; this.damage = 15; this.xp = 10;
                    this.radius = 20; this.sprite = '👹'; this.color = '#f00'; this.isElite = true;
                } else if (type === 'boss') {
                    this.hp = 2000 * globalDifficulty * (1 + (gameTime/300)); this.speed = 2.4; this.damage = 30; this.xp = 500;
                    this.radius = 45; this.sprite = '👿'; this.color = '#f80'; this.isBoss = true;
                }
            }
        }

        function spawnSystem(time) {
            const minutes = time / 60;
            let spawnCap = Math.min(250, 50 + (minutes * 25));
            if (enemies.length < spawnCap) {
                enemyPoolTimer++;
                if (enemyPoolTimer > Math.max(8, 60 - (minutes * 6))) {
                    spawnEnemy(); enemyPoolTimer = 0;
                }
            }
            checkBossSpawn(minutes);
        }

        let bossSpawnedFlags = [false, false, false, false];
        function checkBossSpawn(mins) {
            [1, 3, 5, 7].forEach((t, i) => {
                if (mins >= t && !bossSpawnedFlags[i]) {
                    spawnBoss(i); bossSpawnedFlags[i] = true;
                    flashScreen('⚠️ LORDE DAS TREVAS ⚠️');
                }
            });
        }

        function spawnBoss(index) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.max(width, height) / 2 + 60;
            const e = new Enemy('boss', player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist);
            if(index===1) { e.sprite='🧛'; e.speed=1.2; e.hp*=1.5; } // Vampiro Tank
            if(index===2) { e.sprite='🐺'; e.speed=3.5; e.hp*=0.8; } // Lobisomem Rapido
            if(index===3) { e.sprite='🐲'; e.radius=60; e.hp*=3; } // Dragão Final
            enemies.push(e);
        }

        function spawnEnemy() {
            const angle = Math.random() * Math.PI * 2;
            const r = Math.max(width, height) / 2 + 50;
            const type = Math.random() < 0.05 && gameTime > 120 ? 'elite' : (Math.random() < 0.3 && gameTime > 60 ? 'skeleton' : 'bat');
            enemies.push(new Enemy(type, player.x + Math.cos(angle)*r, player.y + Math.sin(angle)*r));
        }

        function updateEnemies(dt) {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dx = player.x - e.x, dy = player.y - e.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 0) { e.x += (dx/dist)*e.speed; e.y += (dy/dist)*e.speed; }
                e.x += e.pushX; e.y += e.pushY;
                e.pushX *= 0.9; e.pushY *= 0.9;
                if (dist > 2500) enemies.splice(i, 1);
            }
        }

        function updateWeapons(dt) {
            for (const key in skills) {
                const s = skills[key];
                if (s.level === 0 || s.type !== SKILL_TYPES.WEAPON) continue;
                if (s.active) {
                    if (key === 'garlic') {
                        if (s.timer <= 0) {
                            spawnAreaDamage(player.x, player.y, 60 + (s.level*10), 3+s.level, '#ffaaee');
                            s.timer = s.cooldown * stats.cooldownMult;
                        } else s.timer--;
                    }
                } else {
                    if (s.timer <= 0) { fireWeapon(key, s); s.timer = s.cooldown * stats.cooldownMult; }
                    else s.timer--;
                }
            }
        }

        function fireWeapon(key, s) {
            const count = 1 + stats.amount;
            if (key === 'magicWand') {
                for(let i=0; i<count; i++) setTimeout(() => {
                    const t = getNearestEnemy();
                    if(t) shootProjectile(player.x, player.y, t, 'missile', 10+(s.level*5), '#0ff');
                }, i*100);
            }
            else if (key === 'knife') {
                for(let i=0; i<count; i++) {
                    const a = player.facingRight ? 0 : Math.PI;
                    const spread = (i-(count-1)/2)*0.2;
                    shootProjectileDir(player.x, player.y, Math.cos(a+spread), Math.sin(a+spread), 'knife', 8+s.level*2, '#ccc');
                }
            }
            else if (key === 'axe') {
                for(let i=0; i<count; i++) {
                    const a = -Math.PI/2 + ((i-(count-1)/2)*0.5);
                    projectiles.push({x:player.x, y:player.y, vx:Math.cos(a)*4, vy:-7, type:'axe', gravity:0.3, damage:15+s.level*5, life:60, radius:10, color:'#f00', rotation:0});
                }
            }
            else if (key === 'fireball') {
                 const t = getNearestEnemy();
                 if(t) {
                     const dx=t.x-player.x, dy=t.y-player.y, d=Math.sqrt(dx*dx+dy*dy);
                     projectiles.push({x:player.x, y:player.y, vx:(dx/d)*3, vy:(dy/d)*3, type:'fireball', damage:20+s.level*8, life:100, radius:12, color:'#f80'});
                 }
            }
            else if (key === 'cross') {
                 const t = getNearestEnemy();
                 let vx=5, vy=0;
                 if(t) { const dx=t.x-player.x, dy=t.y-player.y, d=Math.sqrt(dx*dx+dy*dy); vx=(dx/d)*5; vy=(dy/d)*5; }
                 projectiles.push({x:player.x, y:player.y, vx:vx, vy:vy, type:'cross', damage:12+s.level*3, life:120, radius:10, color:'#ff0', rotation:0});
            }
            else if (key === 'holyWater') {
                for(let i=0; i<count; i++) {
                    const a = Math.random()*Math.PI*2, r = Math.random()*100;
                    spawnAreaDamage(player.x+Math.cos(a)*r, player.y+Math.sin(a)*r, 40, 10, '#00f', 60);
                }
            }
        }

        function getNearestEnemy() {
            let n = null, minDist = Infinity;
            enemies.forEach(e => { const d=(player.x-e.x)**2+(player.y-e.y)**2; if(d<minDist){minDist=d; n=e;} });
            return n;
        }

        function shootProjectile(x, y, t, type, dmg, color) {
            const dx=t.x-x, dy=t.y-y, d=Math.sqrt(dx*dx+dy*dy);
            projectiles.push({x:x, y:y, vx:(dx/d)*6, vy:(dy/d)*6, type:type, damage:dmg, life:60, radius:6, color:color});
        }
        function shootProjectileDir(x, y, dx, dy, type, dmg, color) {
            projectiles.push({x:x, y:y, vx:dx*8, vy:dy*8, type:type, damage:dmg, life:50, radius:6, color:color});
        }

        function updateProjectiles() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if (p.type === 'axe') { p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.rotation+=0.3; }
                else if (p.type === 'cross') {
                    p.x+=p.vx; p.y+=p.vy; p.rotation-=0.4; p.vx*=0.96; p.vy*=0.96;
                    if(Math.abs(p.vx)<0.5){ const dx=player.x-p.x, dy=player.y-p.y, d=Math.sqrt(dx*dx+dy*dy); p.vx-=(dx/d)*-0.6; p.vy-=(dy/d)*-0.6; }
                }
                else { p.x+=p.vx; p.y+=p.vy; }
                p.life--; if(p.life<=0) projectiles.splice(i, 1);
            }
        }

        function spawnAreaDamage(x, y, radius, damage, color, duration = 10) {
            projectiles.push({x:x, y:y, vx:0, vy:0, type:'area', damage:damage, life:duration, radius:radius*stats.areaMult, color:color, isArea:true});
        }

        function checkCollisions() {
            projectiles.forEach(p => {
                enemies.forEach(e => {
                    const dx=p.x-e.x, dy=p.y-e.y, dist=Math.sqrt(dx*dx+dy*dy);
                    if(dist < p.radius + e.radius) {
                        if(!p.hitList) p.hitList=[];
                        if(p.isArea && p.hitList.includes(e)) return;
                        if(p.isArea) p.hitList.push(e);
                        
                        const isCrit = Math.random() < stats.critChance;
                        const dmg = Math.floor(p.damage * stats.damageMult * (isCrit?2:1));
                        e.hp -= dmg;
                        createDamageNumber(e.x, e.y, dmg, isCrit);
                        
                        if(!e.isBoss && !p.isArea) { e.pushX += p.vx*0.4; e.pushY += p.vy*0.4; }
                        // Efeito de sangue
                        if(!p.isArea) spawnBlood(e.x, e.y, e.color);
                        if(!p.isArea && p.type !== 'cross') p.life = 0;
                    }
                });
            });

            for (let i = enemies.length - 1; i >= 0; i--) {
                if (enemies[i].hp <= 0) { killEnemy(enemies[i]); enemies.splice(i, 1); }
            }

            if(player.iFrames <= 0) {
                for(let e of enemies) {
                    const dist = Math.sqrt((player.x-e.x)**2 + (player.y-e.y)**2);
                    if(dist < player.radius + e.radius - 5) {
                        const dmg = Math.max(1, e.damage - stats.armor);
                        player.hp -= dmg;
                        createDamageNumber(player.x, player.y, dmg, false, true);
                        player.iFrames = 20;
                        flashScreen('#ff000033');
                        if(player.hp<=0) gameOver();
                        break;
                    }
                }
            }
        }

        function spawnBlood(x, y, color) {
            for(let i=0; i<3; i++) particles.push({x:x, y:y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, life:20, color:color, size:Math.random()*4});
        }

        function killEnemy(e) {
            kills++;
            spawnBlood(e.x, e.y, e.color);
            spawnBlood(e.x, e.y, '#fff'); // Bones
            
            let xp=e.xp, color='#00bfff';
            if(xp>5) color='#00ff00'; if(xp>20) color='#ff0000';
            gems.push({x:e.x, y:e.y, xp:xp, color:color, vx:0, vy:0});
            if(e.isBoss && e.hp<=0 && gameTime>400) gameWin();
        }

        function updateGems() {
            for (let i = gems.length - 1; i >= 0; i--) {
                const g = gems[i];
                const dx=player.x-g.x, dy=player.y-g.y, d=Math.sqrt(dx*dx+dy*dy);
                if(d < player.pickupRange) { g.vx+=(dx/d)*1.8; g.vy+=(dy/d)*1.8; g.x+=g.vx; g.y+=g.vy; }
                if(d < player.radius+10) { addXp(g.xp*stats.xpMult); gems.splice(i, 1); }
            }
        }

        function addXp(amount) {
            player.xp += amount;
            if(player.xp >= player.nextLevelXp) {
                player.xp -= player.nextLevelXp;
                player.level++;
                player.nextLevelXp = Math.floor(player.nextLevelXp*1.2)+15;
                showLevelUpScreen();
            }
            updateHUD();
        }

        function showLevelUpScreen() {
            isPaused = true;
            document.getElementById('level-up-screen').classList.remove('hidden');
            const container = document.getElementById('upgrade-container');
            container.innerHTML = '';
            
            const opts = [];
            const possible = Object.keys(skills).filter(k => skills[k].level < skills[k].maxLevel);
            
            if(possible.length===0) {
                 container.appendChild(createUpgradeCard({name:"Frango Assado", icon:"🍗", desc:"Cura Completa", type:"CONSUMÍVEL"}, () => {
                     player.hp=player.maxHp; resumeGame();
                 }));
                 return;
            }

            for(let i=0; i<3; i++) {
                if(possible.length===0) break;
                const r = Math.floor(Math.random()*possible.length);
                opts.push(possible[r]); possible.splice(r, 1);
            }

            opts.forEach(k => {
                const s = skills[k];
                const isNew = s.level===0;
                container.appendChild(createUpgradeCard({
                    name: s.name, icon: s.icon,
                    desc: s.desc, type: s.type,
                    status: isNew ? "NOVO!" : `Nível ${s.level} ➔ ${s.level+1}`
                }, () => { gainSkill(k); resumeGame(); }));
            });
        }

        function createUpgradeCard(info, onClick) {
            const div = document.createElement('div');
            div.className = 'upgrade-card';
            div.innerHTML = `
                <div class="upgrade-title">${info.icon} ${info.name} <span class="upgrade-type">${info.type}</span></div>
                <div class="upgrade-desc" style="color:#fff; margin-bottom:4px; font-weight:bold;">${info.status || ''}</div>
                <div class="upgrade-desc">${info.desc}</div>
            `;
            div.onclick = onClick;
            return div;
        }

        function gainSkill(key) {
            skills[key].level++;
            if(skills[key].type === SKILL_TYPES.PASSIVE) skills[key].apply();
            updateHUD();
        }

        function resumeGame() {
            document.getElementById('level-up-screen').classList.add('hidden');
            setTimeout(() => isPaused = false, 100);
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                if(p.life<=0) particles.splice(i, 1);
            }
            for (let i = damageNumbers.length - 1; i >= 0; i--) {
                const d = damageNumbers[i]; d.y -= 1.5; d.life--;
                if(d.life<=0) damageNumbers.splice(i, 1);
            }
        }

        function createDamageNumber(x, y, amount, isCrit, isPlayerDmg) {
            damageNumbers.push({
                x: x, y: y, text: amount, life: 40,
                color: isPlayerDmg ? '#ff0000' : (isCrit ? '#ffcc00' : '#fff'),
                scale: isCrit ? 1.5 : 1
            });
        }

        function updateHUD() {
            const pct = Math.min(100, (player.xp / player.nextLevelXp) * 100);
            document.getElementById('xp-bar').style.width = pct + '%';
            document.getElementById('kill-count').innerText = `💀 ${kills}`;
            document.getElementById('level-display').innerText = `LVL ${player.level}`;
        }

        function formatTime(s) {
            const m = Math.floor(s/60).toString().padStart(2,'0'), sc = Math.floor(s%60).toString().padStart(2,'0');
            return `${m}:${sc}`;
        }

        function flashScreen(txt) {
            if(txt.startsWith('#')) {
                const f = document.createElement('div');
                f.style.cssText=`position:absolute;top:0;left:0;width:100%;height:100%;background:${txt};z-index:9;pointer-events:none;`;
                document.body.appendChild(f); setTimeout(()=>f.remove(), 150);
            } else {
                const d = document.createElement('div');
                d.innerText = txt;
                d.style.cssText="position:absolute;top:20%;width:100%;text-align:center;color:#ff0000;font-size:24px;text-shadow:0 0 10px #000;font-weight:bold;z-index:20;animation:pulse 1s infinite;";
                document.body.appendChild(d); setTimeout(()=>d.remove(), 4000);
            }
        }

        function gameOver() {
            isGameOver=true;
            document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('go-stats').innerText = `Tempo: ${formatTime(gameTime)} | Abates: ${kills} | Nível: ${player.level}`;
        }
        function gameWin() {
            isGameOver=true;
            const sc = document.getElementById('game-over-screen');
            sc.classList.remove('hidden');
            document.getElementById('go-title').innerText = "VITÓRIA LENDÁRIA!";
            document.getElementById('go-title').style.color = "#ffd700";
            document.getElementById('go-stats').innerText = `Você expurgou o mal!\nTempo: ${formatTime(gameTime)}`;
        }
    </script>
</body>
</html>
